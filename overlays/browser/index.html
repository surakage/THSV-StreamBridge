<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>THSV Browser Overlay Hub</title>
  <link rel="stylesheet" href="/overlay/styles-1.1.1.css">
</head>
<body>
  <main class="overlay" aria-live="polite">
    <section id="alerts" class="alerts" aria-label="Stream alerts"></section>
    <section class="chat-shell" aria-label="Public multistream chat">
      <header><span id="brand-label"></span></header>
      <ol id="chat" class="chat"></ol>
    </section>
    <strong id="status" class="connection-status" data-state="reconnecting">RECONNECTING</strong>
  </main>
  <script src="/overlay/app-1.2.0.js" defer></script>
</body>
</html>
