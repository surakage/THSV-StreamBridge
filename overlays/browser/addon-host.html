<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>THSV Add-on Overlay</title>
  <link rel="stylesheet" href="/overlay/addons/host.css">
</head>
<body>
  <main id="stage" class="stage" aria-live="polite">
    <section id="card" class="card hidden">
      <img id="card-image" class="card-image hidden" alt="">
      <div class="card-copy"><strong id="card-title"></strong><p id="card-text"></p></div>
    </section>
    <section id="media-shell" class="media-shell hidden">
      <video id="media" playsinline></video>
      <strong id="media-title" class="media-title hidden"></strong>
    </section>
    <strong id="status" class="status" data-state="reconnecting">RECONNECTING</strong>
  </main>
  <script src="/overlay/addons/host.js" type="module"></script>
</body>
</html>
